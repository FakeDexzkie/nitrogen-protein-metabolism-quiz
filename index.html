<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nitrogen/Protein Metabolism Quiz</title>
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #172033;
      --muted: #65728a;
      --primary: #1d4ed8;
      --primary-dark: #173ea8;
      --correct: #0f8a4b;
      --correct-bg: #e7f7ee;
      --wrong: #c62828;
      --wrong-bg: #fdeaea;
      --border: #d8deea;
      --shadow: 0 18px 40px rgba(23, 32, 51, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(29, 78, 216, 0.18), transparent 32rem), var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .app { width: min(940px, 94vw); margin: 36px auto; }

    header { text-align: center; margin-bottom: 22px; }

    h1 { margin: 0; font-size: clamp(1.65rem, 3vw, 2.5rem); letter-spacing: -0.03em; }

    .subtitle { color: var(--muted); margin-top: 8px; font-size: 1rem; }

    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
    }

    .top-row {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f3f6fb;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .progress-wrap {
      height: 12px;
      background: #e4e9f2;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #60a5fa);
      transition: width 0.25s ease;
    }

    .question {
      font-size: clamp(1.08rem, 2.2vw, 1.38rem);
      font-weight: 800;
      margin: 0 0 20px;
    }

    .choices { display: grid; gap: 12px; }

    .choice {
      border: 2px solid var(--border);
      border-radius: 15px;
      padding: 14px 16px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: start;
      background: #fff;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      user-select: none;
    }

    .choice:hover { transform: translateY(-1px); border-color: #9ab0dc; }

    .choice input { margin-top: 5px; transform: scale(1.2); accent-color: var(--primary); }

    .letter { font-weight: 800; color: var(--primary); }

    .choice.correct { border-color: var(--correct); background: var(--correct-bg); font-weight: 800; }

    .choice.incorrect { border-color: var(--wrong); background: var(--wrong-bg); }

    .feedback {
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback-title { margin: 0 0 8px; font-weight: 900; }

    .feedback.correct .feedback-title { color: var(--correct); }
    .feedback.incorrect .feedback-title { color: var(--wrong); }

    .explanation { margin: 0; color: #2f3b52; }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 17px;
      font-weight: 800;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-size: 0.96rem;
      transition: background 0.12s ease, transform 0.12s ease;
    }

    button:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); }

    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary { background: #e8edf7; color: var(--text); }

    .secondary:hover:not(:disabled) { background: #d9e2f2; }

    .score-box { color: var(--muted); font-weight: 800; }

    .result { text-align: center; padding: 26px 10px; display: none; }

    .result.show { display: block; }

    .result h2 { font-size: clamp(1.6rem, 4vw, 2.2rem); margin: 0 0 10px; }

    .result-score { font-size: 1.25rem; font-weight: 900; color: var(--primary); margin-bottom: 16px; }

    .review-list { margin-top: 24px; text-align: left; display: grid; gap: 14px; }

    .review-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #f8fafc;
    }

    .review-item strong { color: var(--text); }

    @media (max-width: 560px) {
      .choice { grid-template-columns: 32px 1fr; padding: 13px; }
      .controls { align-items: stretch; }
      .controls button { width: 100%; }
      .score-box { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Nitrogen/Protein Metabolism Quiz</h1>
      <div class="subtitle">Practice Test made with heart by Dyx</div>
    </header>

    <section class="quiz-card" id="quizCard">
      <div id="quizArea">
        <div class="top-row">
          <div class="badge" id="questionBadge">Question 1 of 60</div>
          <div class="badge" id="scoreBadge">Score: 0</div>
        </div>
        <div class="progress-wrap" aria-label="Progress">
          <div class="progress" id="progressBar"></div>
        </div>

        <p class="question" id="questionText"></p>
        <div class="choices" id="choices"></div>

        <div class="feedback" id="feedback">
          <p class="feedback-title" id="feedbackTitle"></p>
          <p class="explanation" id="explanation"></p>
        </div>

        <div class="controls">
          <button class="secondary" id="prevBtn">Previous</button>
          <span class="score-box" id="answeredStatus">Answered: 0 / 60</span>
          <button id="submitBtn">Submit Answer</button>
          <button id="nextBtn" disabled>Next</button>
        </div>
      </div>

      <div class="result" id="resultArea">
        <h2>Quiz Completed</h2>
        <div class="result-score" id="finalScore"></div>
        <p id="finalMessage"></p>
        <button id="restartBtn">Restart Quiz</button>
        <div class="review-list" id="reviewList"></div>
      </div>
    </section>
  </main>

  <script>
    const questionBank = [
  {
    "q": "A patient consuming adequate calories but insufficient dietary protein develops edema and muscle wasting. Which biochemical explanation best accounts for the edema observed in this condition?",
    "choices": {
      "A": "Increased hepatic conversion of amino acid carbon skeletons to triacylglycerols",
      "B": "Reduced synthesis of plasma proteins, particularly albumin, lowering oncotic pressure",
      "C": "Increased ammonium excretion due to metabolic acidosis",
      "D": "Excessive conversion of phenylalanine to tyrosine"
    },
    "answer": "B",
    "explanation": "Kwashiorkor results from severe protein deficiency even when calorie intake may be adequate. Because essential amino acids are lacking, the liver cannot synthesize enough plasma proteins, especially albumin. Albumin maintains plasma oncotic pressure, which helps keep fluid inside blood vessels. When albumin decreases, fluid shifts into tissues, producing edema and a swollen abdomen. Muscle wasting also occurs because the body breaks down its own proteins to supply amino acids for vital functions."
  },
  {
    "q": "Which statement best describes the primary metabolic fate of amino acids after absorption from dietary protein?",
    "choices": {
      "A": "They are stored directly as amino acid polymers for later use",
      "B": "They enter cellular amino acid pools for protein synthesis, nitrogen-containing compound synthesis, or oxidation",
      "C": "They are converted exclusively into glucose through gluconeogenesis",
      "D": "They are transported directly to adipose tissue for conversion into triacylglycerols only"
    },
    "answer": "B",
    "explanation": "Absorbed amino acids enter cellular amino acid pools rather than being stored as a special amino acid reserve. From this pool, they may be used to synthesize body proteins, produce nitrogen-containing compounds such as neurotransmitters, hormones, heme, creatine phosphate, melanin, and nucleotide bases, or undergo oxidation for energy. When amino acids are oxidized, their nitrogen must be removed first, while the carbon skeleton enters energy-producing or storage pathways."
  },
  {
    "q": "Before amino acids can be oxidized for energy, which process must generally occur first?",
    "choices": {
      "A": "Conversion of carbon skeletons into urea",
      "B": "Removal of nitrogen from the amino acid",
      "C": "Condensation of amino acids into glycogen",
      "D": "Direct conversion of amino acids into bile salts"
    },
    "answer": "B",
    "explanation": "Before amino acids can be used as an energy source, their amino nitrogen must generally be removed by transamination or deamination. The nitrogen portion cannot simply enter energy pathways like the carbon skeleton can. Removed nitrogen may form ammonia, which is toxic, so the liver converts it to urea through the urea cycle. The remaining carbon skeleton can then enter pathways such as glycolysis, the TCA cycle, ketone body production, or gluconeogenesis."
  },
  {
    "q": "Which organ is the principal site for amino acid oxidation and conversion of toxic ammonia into urea?",
    "choices": {
      "A": "Kidney",
      "B": "Liver",
      "C": "Skeletal muscle",
      "D": "Intestinal epithelium"
    },
    "answer": "B",
    "explanation": "The liver is the central organ for amino acid oxidation and nitrogen disposal. It receives amino acids from the intestine through the hepatic portal vein and can use them for protein synthesis, gluconeogenesis, ketogenesis, or conversion to fat. The liver also contains the urea cycle, which converts toxic ammonia into urea. The kidney excretes urea, but the liver is the primary site where urea is produced."
  },
  {
    "q": "Branched-chain amino acids are unusual because they can be significantly oxidized in which tissue?",
    "choices": {
      "A": "Skeletal muscle",
      "B": "Red blood cells",
      "C": "Adipose tissue",
      "D": "Pancreatic acinar cells"
    },
    "answer": "A",
    "explanation": "Skeletal muscle is especially important in the metabolism of branched-chain amino acids: leucine, isoleucine, and valine. Unlike many amino acids that are primarily catabolized in the liver, branched-chain amino acids are significantly oxidized in muscle. This becomes important during fasting and exercise because muscle can use these amino acids for energy and transfer nitrogen to alanine and glutamine for transport to other organs."
  },
  {
    "q": "Under normal physiological conditions, which nitrogenous product accounts for approximately 90% of nitrogen excretion?",
    "choices": {
      "A": "Uric acid",
      "B": "Creatinine",
      "C": "Urea",
      "D": "Ammonium ion"
    },
    "answer": "C",
    "explanation": "Urea is the dominant nitrogenous excretory product under normal conditions and accounts for about 90% of nitrogen excretion. It is produced in the liver from ammonia through the urea cycle and is excreted by the kidney in urine. Urea excretion changes with dietary protein intake because more amino acid catabolism produces more nitrogen waste. Ammonium, creatinine, and uric acid are also excreted, but they contribute less to total nitrogen excretion."
  },
  {
    "q": "During metabolic acidosis, ammonium excretion increases primarily because the kidney uses ammonia to:",
    "choices": {
      "A": "Increase hepatic urea synthesis",
      "B": "Bind excess protons in urine",
      "C": "Convert alanine into glucose",
      "D": "Activate pancreatic zymogens"
    },
    "answer": "B",
    "explanation": "During metabolic acidosis, the kidney increases ammonia production and excretion. Ammonia binds excess hydrogen ions in the urine to form ammonium, helping remove acid from the body. This is a major renal buffering mechanism. The process is especially linked to glutamine metabolism in the kidney, where glutamine can release ammonia that becomes ammonium in the urine."
  },
  {
    "q": "Which of the following best represents a state of negative nitrogen balance?",
    "choices": {
      "A": "Nitrogen intake equals nitrogen excretion",
      "B": "Nitrogen intake exceeds nitrogen excretion",
      "C": "Nitrogen excretion exceeds nitrogen intake",
      "D": "Nitrogen intake and protein synthesis both increase equally"
    },
    "answer": "C",
    "explanation": "Negative nitrogen balance means the body loses more nitrogen than it takes in. This indicates that protein breakdown exceeds protein synthesis, which commonly occurs in malnutrition, severe illness, trauma, burns, or starvation. It is different from neutral balance, where intake equals excretion, and positive balance, where intake exceeds excretion during growth, pregnancy, or recovery."
  },
  {
    "q": "Which physiological condition is most closely associated with positive nitrogen balance?",
    "choices": {
      "A": "Starvation",
      "B": "Severe illness",
      "C": "Pregnancy",
      "D": "Chronic protein malnutrition"
    },
    "answer": "C",
    "explanation": "Positive nitrogen balance occurs when nitrogen intake is greater than nitrogen excretion. This means the body is retaining nitrogen for net protein synthesis. Pregnancy is a classic example because maternal and fetal tissues are growing and require new protein formation. Growth, tissue repair, and recovery from illness are also associated with positive nitrogen balance. Starvation, severe illness, and chronic protein malnutrition usually cause negative nitrogen balance."
  },
  {
    "q": "Tyrosine is classified as non-essential in adults because it can be synthesized from which essential amino acid?",
    "choices": {
      "A": "Methionine",
      "B": "Phenylalanine",
      "C": "Threonine",
      "D": "Tryptophan"
    },
    "answer": "B",
    "explanation": "Tyrosine is considered non-essential in adults because it can be synthesized from phenylalanine, an essential amino acid. However, this depends on adequate phenylalanine intake and normal metabolism. This relationship is clinically important because if phenylalanine metabolism is impaired, tyrosine can become conditionally important. The key concept is that tyrosine’s carbon skeleton can be supplied from phenylalanine."
  },
  {
    "q": "Cysteine synthesis is dependent on glucose-derived carbon skeletons but also requires sulfur from which essential amino acid?",
    "choices": {
      "A": "Lysine",
      "B": "Histidine",
      "C": "Methionine",
      "D": "Valine"
    },
    "answer": "C",
    "explanation": "Cysteine can be synthesized by the body, but its synthesis requires sulfur from methionine, an essential amino acid. This makes cysteine conditionally dependent on methionine availability. Its carbon skeleton can be derived from glucose-related metabolism, but without methionine-derived sulfur, cysteine synthesis is limited. Cysteine is also important in proteins, glutathione, and disulfide bond formation."
  },
  {
    "q": "Which amino acid is considered essential during growth but not required as an essential amino acid in adults?",
    "choices": {
      "A": "Arginine",
      "B": "Alanine",
      "C": "Glutamine",
      "D": "Glycine"
    },
    "answer": "A",
    "explanation": "Arginine is considered conditionally essential during periods of growth because endogenous synthesis may not meet the body’s demand. In healthy adults, arginine is usually not classified as essential because the body can synthesize enough. During growth, recovery, or certain stress states, arginine demand may increase. This illustrates that essentiality can depend on age and physiological condition."
  },
  {
    "q": "After removal of nitrogen, amino acid carbon skeletons may be converted into all of the following except:",
    "choices": {
      "A": "Pyruvate",
      "B": "Acetyl CoA",
      "C": "TCA cycle intermediates",
      "D": "Urea nitrogen"
    },
    "answer": "D",
    "explanation": "After nitrogen removal, amino acid carbon skeletons are metabolized through carbon-based pathways. They can become pyruvate, acetyl CoA, or intermediates of the TCA cycle, which can then support energy production, gluconeogenesis, ketogenesis, or lipid synthesis. Urea nitrogen is not a carbon skeleton product; it comes from the removed nitrogen atoms that are detoxified through the urea cycle."
  },
  {
    "q": "In the fed state, amino acids released from dietary proteins travel first through the hepatic portal vein to the liver, where excess carbon skeletons may be converted into:",
    "choices": {
      "A": "Glucose or triacylglycerols",
      "B": "Ammonium or bilirubin",
      "C": "Creatinine or uric acid",
      "D": "Pepsinogen or trypsinogen"
    },
    "answer": "A",
    "explanation": "In the fed state, amino acids from dietary protein enter the liver through the hepatic portal vein. Amino acids are first used for protein synthesis and other essential nitrogen-containing compounds. When amino acids are present in excess, their nitrogen is removed and the carbon skeletons may be converted into glucose, glycogen, fatty acids, or triacylglycerols. Triacylglycerols can be packaged into VLDL for export from the liver."
  },
  {
    "q": "Which nitrogenous waste is primarily derived from purine breakdown?",
    "choices": {
      "A": "Creatinine",
      "B": "Uric acid",
      "C": "Bilirubin",
      "D": "Ammonia"
    },
    "answer": "B",
    "explanation": "Uric acid is produced from the breakdown of purine bases. This distinguishes it from creatinine, which comes from creatine phosphate metabolism, and bilirubin, which comes from heme breakdown. Ammonia is produced from amino acid and glutamine metabolism and may be converted to urea or excreted as ammonium. Knowing the origin of each nitrogenous waste helps connect metabolism with urinary excretion patterns."
  },
  {
    "q": "Protein digestion begins in the stomach primarily through the action of which enzyme?",
    "choices": {
      "A": "Trypsin",
      "B": "Pepsin",
      "C": "Elastase",
      "D": "Aminopeptidase"
    },
    "answer": "B",
    "explanation": "Protein digestion begins in the stomach with pepsin. Pepsin is produced from its inactive precursor, pepsinogen, and starts breaking dietary proteins into smaller polypeptides. Although the stomach begins protein digestion, complete digestion requires pancreatic proteases and intestinal peptidases in the small intestine. Trypsin, elastase, and aminopeptidases act mainly later in the digestive process."
  },
  {
    "q": "Pepsinogen is secreted by chief cells and converted to pepsin mainly because of:",
    "choices": {
      "A": "Bicarbonate released by the pancreas",
      "B": "Hydrochloric acid secreted by parietal cells",
      "C": "Trypsin released from pancreatic zymogens",
      "D": "Sodium-dependent amino acid transport"
    },
    "answer": "B",
    "explanation": "Pepsinogen is secreted by chief cells in the stomach and is activated when hydrochloric acid from parietal cells lowers the gastric pH. Acidic pH causes conformational changes and autocatalytic cleavage that convert pepsinogen to pepsin. This is an example of zymogen activation, which prevents enzymes from digesting proteins inside the cells where they are produced."
  },
  {
    "q": "Which statement best explains why gastric acid facilitates protein digestion?",
    "choices": {
      "A": "It converts amino acids into glucose",
      "B": "It denatures dietary proteins, making peptide bonds more accessible",
      "C": "It activates intestinal aminopeptidases in the brush border",
      "D": "It directly transports amino acids into epithelial cells"
    },
    "answer": "B",
    "explanation": "Gastric acid helps protein digestion by denaturing dietary proteins. Denaturation unfolds proteins and exposes peptide bonds, making them more accessible to pepsin. HCl also helps activate pepsinogen into pepsin. It does not directly convert amino acids into glucose or transport them into epithelial cells; those are later metabolic and absorptive processes."
  },
  {
    "q": "Pepsin is best classified as a/an:",
    "choices": {
      "A": "Exopeptidase active at neutral pH",
      "B": "Endopeptidase active at low pH",
      "C": "Aminopeptidase active in the intestinal brush border",
      "D": "Serosal transporter for amino acid release"
    },
    "answer": "B",
    "explanation": "Pepsin is an endopeptidase because it cleaves peptide bonds within the interior of polypeptide chains rather than removing amino acids from an end. It is active at low pH, which matches the acidic environment of the stomach. In contrast, aminopeptidases act at the brush border, and carboxypeptidases remove amino acids from the carboxyl end in the intestine."
  },
  {
    "q": "Pepsin preferentially cleaves peptide bonds involving which type of amino acid residues?",
    "choices": {
      "A": "Branched-chain or sulfur-containing residues",
      "B": "Aromatic or acidic residues",
      "C": "Basic residues only",
      "D": "Small side-chain residues only"
    },
    "answer": "B",
    "explanation": "Pepsin preferentially cleaves peptide bonds involving aromatic or acidic amino acid residues. This specificity helps produce smaller peptides from dietary proteins during gastric digestion. Different proteases have different specificities: trypsin acts after lysine and arginine, chymotrypsin prefers hydrophobic residues, and elastase acts near small side-chain residues."
  },
  {
    "q": "Pancreatic proteases are secreted mainly as inactive zymogens in order to:",
    "choices": {
      "A": "Prevent premature digestion of pancreatic proteins",
      "B": "Increase sodium absorption in the small intestine",
      "C": "Promote direct absorption of intact proteins",
      "D": "Convert ammonia into urea before intestinal absorption"
    },
    "answer": "A",
    "explanation": "Pancreatic proteases are secreted as inactive zymogens to protect the pancreas from autodigestion. If enzymes like trypsin, chymotrypsin, or elastase were active inside pancreatic cells, they could digest cellular proteins. Activation occurs only after the zymogens enter the intestinal lumen. This zymogen strategy is a major safety mechanism in digestive enzyme production."
  },
  {
    "q": "Trypsinogen is activated to trypsin in the small intestine by:",
    "choices": {
      "A": "Pepsin",
      "B": "Enteropeptidase",
      "C": "Carboxypeptidase A",
      "D": "Na⁺,K⁺-ATPase"
    },
    "answer": "B",
    "explanation": "Trypsinogen is activated by enteropeptidase, an enzyme produced by intestinal cells. Once trypsin is formed, it activates more trypsinogen and also activates other pancreatic zymogens. This makes trypsin a key initiating enzyme in small intestinal protein digestion. Pepsin acts in the stomach, and Na⁺,K⁺-ATPase is involved in transport, not zymogen activation."
  },
  {
    "q": "Trypsin plays a central role in intestinal protein digestion because it:",
    "choices": {
      "A": "Cleaves only amino acids from the amino terminal end",
      "B": "Activates other pancreatic zymogens after its own activation",
      "C": "Transports amino acids across the basolateral membrane",
      "D": "Converts dietary protein directly into urea"
    },
    "answer": "B",
    "explanation": "Trypsin is central because after it is activated by enteropeptidase, it activates several other pancreatic zymogens, including chymotrypsinogen, proelastase, and procarboxypeptidases. This creates an activation cascade in the intestinal lumen. Trypsin also directly digests proteins by cleaving peptide bonds after lysine and arginine residues."
  },
  {
    "q": "Which set includes the pancreatic serine endopeptidases involved in protein digestion?",
    "choices": {
      "A": "Trypsin, chymotrypsin, and elastase",
      "B": "Pepsin, aminopeptidase, and cathepsin",
      "C": "Carboxypeptidase A, carboxypeptidase B, and oxoprolinase",
      "D": "Caspase, calpain, and proteasome"
    },
    "answer": "A",
    "explanation": "Trypsin, chymotrypsin, and elastase are pancreatic serine endopeptidases. They contain an active-site serine and cleave internal peptide bonds within proteins. Their specificities differ: trypsin targets lysine and arginine, chymotrypsin prefers hydrophobic residues, and elastase cleaves near small amino acids. Pepsin is gastric, while cathepsins are lysosomal proteases."
  },
  {
    "q": "Trypsin specifically cleaves peptide bonds after which amino acid residues?",
    "choices": {
      "A": "Alanine and glycine",
      "B": "Lysine and arginine",
      "C": "Phenylalanine and tyrosine",
      "D": "Glutamate and aspartate"
    },
    "answer": "B",
    "explanation": "Trypsin specifically cleaves peptide bonds on the carboxyl side of basic amino acids, especially lysine and arginine. This specificity is important in protein digestion and is also widely used in biochemical protein analysis. Chymotrypsin and elastase have different preferences, so multiple enzymes are needed to efficiently digest proteins with varied amino acid sequences."
  },
  {
    "q": "Chymotrypsin preferentially cleaves peptide bonds involving:",
    "choices": {
      "A": "Hydrophobic residues",
      "B": "Basic residues",
      "C": "Acidic residues only",
      "D": "Cystine residues"
    },
    "answer": "A",
    "explanation": "Chymotrypsin preferentially cleaves peptide bonds involving hydrophobic amino acid residues. This includes residues with bulky nonpolar side chains. Its specificity complements the action of trypsin and elastase, allowing pancreatic digestion to break proteins into a broad range of smaller peptides. It is activated from chymotrypsinogen by trypsin."
  },
  {
    "q": "Elastase is most associated with cleavage near amino acids that have:",
    "choices": {
      "A": "Large aromatic side chains",
      "B": "Small side chains such as alanine and glycine",
      "C": "Positively charged side chains such as lysine",
      "D": "Sulfur-containing side chains only"
    },
    "answer": "B",
    "explanation": "Elastase cleaves peptide bonds near amino acids with small side chains, such as alanine and glycine. This is different from trypsin, which targets basic residues, and chymotrypsin, which prefers hydrophobic residues. Elastase is secreted as the zymogen proelastase and is activated by trypsin in the small intestine."
  },
  {
    "q": "Carboxypeptidases differ from trypsin, chymotrypsin, and elastase because carboxypeptidases:",
    "choices": {
      "A": "Remove amino acids from the carboxyl end of peptides",
      "B": "Remove amino acids from the amino end of peptides",
      "C": "Function only in lysosomes",
      "D": "Require ubiquitin tagging before activation"
    },
    "answer": "A",
    "explanation": "Carboxypeptidases are exopeptidases, meaning they remove amino acids from the ends of peptides. Specifically, they remove amino acids from the carboxyl terminal end. This contrasts with trypsin, chymotrypsin, and elastase, which are endopeptidases that cleave internal peptide bonds. Both endopeptidases and exopeptidases are needed for complete protein digestion."
  },
  {
    "q": "Which pairing is correctly matched?",
    "choices": {
      "A": "Carboxypeptidase A — basic amino acids such as lysine and arginine",
      "B": "Carboxypeptidase B — hydrophobic amino acids",
      "C": "Aminopeptidase — removal of amino acids from the amino end",
      "D": "Pepsin — pancreatic protease activated by enteropeptidase"
    },
    "answer": "C",
    "explanation": "Aminopeptidases remove amino acids from the amino terminal end of peptides, especially at the brush border of intestinal epithelial cells. Carboxypeptidase A prefers hydrophobic amino acids, while carboxypeptidase B targets basic amino acids such as lysine and arginine. Pepsin is a gastric enzyme activated by acid, not a pancreatic enzyme activated by enteropeptidase."
  },
  {
    "q": "Amino acids are absorbed from the intestinal lumen mainly through:",
    "choices": {
      "A": "Secondary active Na⁺-dependent transport systems and facilitated diffusion",
      "B": "ATP-dependent proteasomal transport and pinocytosis only",

    let questions = shuffleQuestions(questionBank);
    let currentIndex = 0;
    let selectedAnswer = null;
    let userAnswers = new Array(questions.length).fill(null);
    let submitted = new Array(questions.length).fill(false);

    const questionBadge = document.getElementById("questionBadge");
    const scoreBadge = document.getElementById("scoreBadge");
    const progressBar = document.getElementById("progressBar");
    const questionText = document.getElementById("questionText");
    const choicesEl = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const feedbackTitle = document.getElementById("feedbackTitle");
    const explanation = document.getElementById("explanation");
    const prevBtn = document.getElementById("prevBtn");
    const submitBtn = document.getElementById("submitBtn");
    const nextBtn = document.getElementById("nextBtn");
    const answeredStatus = document.getElementById("answeredStatus");
    const quizArea = document.getElementById("quizArea");
    const resultArea = document.getElementById("resultArea");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const restartBtn = document.getElementById("restartBtn");
    const reviewList = document.getElementById("reviewList");

    function shuffleQuestions(items) {
      const shuffled = items.map(item => ({ ...item }));
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function getScore() {
      return userAnswers.reduce((score, ans, idx) => score + (ans === questions[idx].answer ? 1 : 0), 0);
    }

    function getAnsweredCount() {
      return submitted.filter(Boolean).length;
    }

    function renderQuestion() {
      const item = questions[currentIndex];
      selectedAnswer = userAnswers[currentIndex];

      questionBadge.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      scoreBadge.textContent = `Score: ${getScore()}`;
      answeredStatus.textContent = `Answered: ${getAnsweredCount()} / ${questions.length}`;
      progressBar.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

      questionText.textContent = `${currentIndex + 1}. ${item.q}`;
      choicesEl.innerHTML = "";

      Object.entries(item.choices).forEach(([letter, text]) => {
        const label = document.createElement("label");
        label.className = "choice";
        label.dataset.letter = letter;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "choice";
        input.value = letter;
        input.checked = selectedAnswer === letter;
        input.disabled = submitted[currentIndex];

        const content = document.createElement("div");
        content.innerHTML = `<span class="letter">${letter}.</span> ${escapeHtml(text)}`;

        label.appendChild(input);
        label.appendChild(content);
        label.addEventListener("click", () => {
          if (!submitted[currentIndex]) {
            selectedAnswer = letter;
            userAnswers[currentIndex] = letter;
          }
        });

        choicesEl.appendChild(label);
      });

      feedback.className = "feedback";
      feedbackTitle.textContent = "";
      explanation.textContent = "";

      if (submitted[currentIndex]) {
        showFeedback();
      }

      prevBtn.disabled = currentIndex === 0;
      submitBtn.disabled = submitted[currentIndex];
      nextBtn.disabled = !submitted[currentIndex];
      nextBtn.textContent = currentIndex === questions.length - 1 ? "Finish Quiz" : "Next";
    }

    function showFeedback() {
      const item = questions[currentIndex];
      const answer = userAnswers[currentIndex];
      const isCorrect = answer === item.answer;

      document.querySelectorAll(".choice").forEach(choice => {
        const letter = choice.dataset.letter;
        choice.querySelector("input").disabled = true;

        if (letter === item.answer) {
          choice.classList.add("correct");
        } else if (letter === answer && !isCorrect) {
          choice.classList.add("incorrect");
        }
      });

      feedback.classList.add("show", isCorrect ? "correct" : "incorrect");
      feedbackTitle.textContent = isCorrect
        ? `Correct. Answer: ${item.answer}`
        : `Incorrect. Correct answer: ${item.answer}`;
      explanation.textContent = item.explanation;
      scoreBadge.textContent = `Score: ${getScore()}`;
      answeredStatus.textContent = `Answered: ${getAnsweredCount()} / ${questions.length}`;
    }

    function submitAnswer() {
      if (!selectedAnswer) {
        alert("Please select an answer first.");
        return;
      }
      userAnswers[currentIndex] = selectedAnswer;
      submitted[currentIndex] = true;
      showFeedback();
      submitBtn.disabled = true;
      nextBtn.disabled = false;
    }

    function nextQuestion() {
      if (currentIndex === questions.length - 1) {
        showResults();
      } else {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function showResults() {
      quizArea.style.display = "none";
      resultArea.classList.add("show");
      const score = getScore();
      const percent = Math.round((score / questions.length) * 100);
      finalScore.textContent = `${score} / ${questions.length} (${percent}%)`;
      finalMessage.textContent = percent >= 80
        ? "Excellent work. You demonstrated strong mastery of nitrogen/protein metabolism."
        : percent >= 60
          ? "Good effort. Review the explanations for the items you missed."
          : "Keep reviewing the key concepts, especially digestion, transport, turnover, and fasting metabolism.";

      reviewList.innerHTML = "";
      questions.forEach((item, index) => {
        const answer = userAnswers[index] || "No answer";
        const correct = answer === item.answer;
        const div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = `
          <strong>${index + 1}. ${escapeHtml(item.q)}</strong><br>
          Your answer: <strong style="color:${correct ? 'var(--correct)' : 'var(--wrong)'}">${answer}</strong><br>
          Correct answer: <strong>${item.answer}. ${escapeHtml(item.choices[item.answer])}</strong><br>
          Explanation: ${escapeHtml(item.explanation)}
        `;
        reviewList.appendChild(div);
      });
    }

    function restartQuiz() {
      questions = shuffleQuestions(questionBank);
      currentIndex = 0;
      selectedAnswer = null;
      userAnswers = new Array(questions.length).fill(null);
      submitted = new Array(questions.length).fill(false);
      resultArea.classList.remove("show");
      quizArea.style.display = "block";
      renderQuestion();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    submitBtn.addEventListener("click", submitAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    prevBtn.addEventListener("click", prevQuestion);
    restartBtn.addEventListener("click", restartQuiz);

    renderQuestion();
  </script>
